name: "Grass Manager Multi-Impianto"
description: "Portale multiutente e multi-impianto con abbonamenti gestiti esclusivamente per utente"
version: "1.0.0"
slug: "grass_manager"
url: "https://github.com/emaiod/grass-manager"
init: false
startup: application
boot: auto
ingress: false
panel_icon: "mdi:sprinkler-variant"
panel_title: "Grass Manager"
homeassistant_api: true
arch:
  - aarch64
  - amd64
ports:
  8100/tcp: 8100
ports_description:
  8100/tcp: "Portale multiutente Grass Manager (proteggere con HTTPS/reverse proxy)"
webui: "http://[HOST]:[PORT:8100]"
options:
  bootstrap_admin_username: "admin"
  bootstrap_admin_password: "change-me-now"
schema:
  bootstrap_admin_username: str
  bootstrap_admin_password: password